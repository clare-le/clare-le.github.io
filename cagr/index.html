<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>年化複合成長率 CAGR 計算機</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a31;
      --card2: #1a2550;
      --text: #eef2ff;
      --muted: #b8c0e0;
      --accent: #7c9bff;
      --accent2: #59d0ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at 20% 0%, #182445 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .wrap { width: min(480px, 100%); }
    .card {
      background: linear-gradient(135deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 10px 35px rgba(0,0,0,.35);
    }
    h1 { margin: 0 0 4px; font-size: 24px; }
    .sub { margin: 0 0 24px; font-size: 13px; color: var(--muted); }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .unit {
      position: absolute; right: 14px;
      font-size: 13px; font-weight: 700; color: var(--accent);
      pointer-events: none; user-select: none;
    }
    input[type="number"] {
      width: 100%;
      padding: 13px 52px 13px 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(124,155,255,.35);
      border-radius: 12px;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      outline: none;
      transition: border-color .15s;
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type="number"]:focus { border-color: rgba(89,208,255,.6); }

    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.08);
      margin: 20px 0;
    }

    .result-box {
      background: rgba(89,208,255,.06);
      border: 1px solid rgba(89,208,255,.25);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }
    .result-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .result-value {
      font-size: 48px;
      font-weight: 800;
      color: var(--accent2);
      letter-spacing: -1px;
    }
    .result-value.negative { color: #ff7c7c; }
    .result-value.empty { color: rgba(255,255,255,.2); font-size: 36px; }

    .formula {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .btn {
      display: block;
      width: 100%;
      margin: 20px 0 0;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0b1020;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .footer { margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center; }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<main class="wrap">
  <div class="card">
    <h1>📈 CAGR 計算機</h1>
    <p class="sub">年化複合成長率（Compound Annual Growth Rate）</p>

    <div class="field">
      <label>起始值</label>
      <div class="input-wrap">
        <input type="number" id="start" placeholder="100000" min="0" />
        <span class="unit">元</span>
      </div>
    </div>

    <div class="field">
      <label>結束值</label>
      <div class="input-wrap">
        <input type="number" id="end" placeholder="180000" min="0" />
        <span class="unit">元</span>
      </div>
    </div>

    <div class="field">
      <label>投資年數</label>
      <div class="input-wrap">
        <input type="number" id="years" placeholder="5" min="0.01" step="0.5" />
        <span class="unit">年</span>
      </div>
    </div>

    <button class="btn" id="calcBtn">計算</button>

    <hr class="divider" />

    <div class="result-box">
      <div class="result-label">年化複合成長率</div>
      <div class="result-value empty" id="result">— %</div>
    </div>

    <div class="formula" id="formula"></div>

    <div class="footer">
      CAGR = (結束值 ÷ 起始值)^(1 ÷ 年數) − 1 &nbsp;·&nbsp;
      <a href="https://clare-le.github.io">← 返回首頁</a>
    </div>
  </div>
</main>

<script>
  const startEl = document.getElementById('start');
  const endEl = document.getElementById('end');
  const yearsEl = document.getElementById('years');
  const resultEl = document.getElementById('result');
  const formulaEl = document.getElementById('formula');

  function calc() {
    const s = parseFloat(startEl.value);
    const e = parseFloat(endEl.value);
    const y = parseFloat(yearsEl.value);

    if (isNaN(s) || isNaN(e) || isNaN(y) || s <= 0 || e <= 0 || y <= 0) {
      resultEl.textContent = '— %';
      resultEl.className = 'result-value empty';
      formulaEl.textContent = '';
      return;
    }

    const cagr = Math.pow(e / s, 1 / y) - 1;
    const pct = (cagr * 100).toFixed(2);

    resultEl.textContent = (cagr >= 0 ? '+' : '') + pct + ' %';
    resultEl.className = 'result-value' + (cagr < 0 ? ' negative' : '');

    const gain = e - s;
    const gainSign = gain >= 0 ? '+' : '';
    formulaEl.textContent = `總報酬 ${gainSign}${((e/s - 1)*100).toFixed(1)}%，${y} 年，總損益 ${gainSign}${gain.toLocaleString()} 元`;
  }

  document.getElementById('calcBtn').addEventListener('click', calc);
  [startEl, endEl, yearsEl].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') calc(); }));
</script>
</body>
</html>
