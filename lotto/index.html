<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>威力彩號碼產生器</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a31;
      --card2: #1a2550;
      --text: #eef2ff;
      --muted: #b8c0e0;
      --accent: #7c9bff;
      --accent2: #59d0ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
      background: radial-gradient(circle at 20% 0%, #182445 0%, var(--bg) 55%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .wrap { width: min(500px, 100%); }
    .card {
      background: linear-gradient(135deg, var(--card), var(--card2));
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 30px 24px 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,.4);
      text-align: center;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

    /* Zone labels */
    .zone-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    /* Balls container */
    .zone1 {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .zone2-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 28px;
    }

    /* Ball base */
    .ball {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      position: relative;
      opacity: 0;
      transform: scale(0) translateY(-30px);
      transition: none;
      flex-shrink: 0;
      user-select: none;
    }
    .ball.show {
      animation: ball-drop .5s cubic-bezier(.2,1.4,.4,1) forwards;
    }
    @keyframes ball-drop {
      0%   { opacity: 0; transform: scale(0) translateY(-40px); }
      60%  { opacity: 1; transform: scale(1.12) translateY(4px); }
      80%  { transform: scale(.95) translateY(-2px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Shine overlay inside ball */
    .ball::before {
      content: '';
      position: absolute;
      top: 8px; left: 12px;
      width: 40%; height: 30%;
      border-radius: 50%;
      background: rgba(255,255,255,.55);
      filter: blur(3px);
      pointer-events: none;
    }

    /* Zone 1 - red balls */
    .ball-red {
      background: radial-gradient(circle at 35% 30%, #ff6b6b, #c0152a);
      border: 2px solid rgba(255,120,120,.5);
      box-shadow: 0 4px 18px rgba(192,21,42,.5), inset 0 -4px 10px rgba(0,0,0,.3);
      color: #fff;
    }

    /* Zone 2 - blue power ball */
    .ball-blue {
      width: 70px;
      height: 70px;
      font-size: 24px;
      background: radial-gradient(circle at 35% 30%, #5bc8ff, #1050c8);
      border: 2px solid rgba(89,208,255,.5);
      box-shadow: 0 4px 22px rgba(16,80,200,.6), inset 0 -4px 10px rgba(0,0,0,.3);
      color: #fff;
    }
    .ball-blue::before {
      width: 38%; height: 28%;
    }

    /* Power star badge */
    .power-badge {
      margin-top: 8px;
      font-size: 12px;
      color: var(--accent2);
      font-weight: 700;
      letter-spacing: .5px;
      opacity: 0;
      transition: opacity .3s;
    }
    .power-badge.show { opacity: 1; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,.08);
      margin: 4px 0 20px;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #e84040, #ff7a2a);
      color: #fff;
      box-shadow: 0 4px 18px rgba(232,64,64,.3);
      transition: .15s ease;
      letter-spacing: .5px;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(232,64,64,.45); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: rgba(124,155,255,.12); color: var(--muted); box-shadow: none; cursor: not-allowed; }

    /* History */
    .history {
      margin-top: 20px;
      text-align: left;
    }
    .history-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 180px;
      overflow-y: auto;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: rgba(124,155,255,.3); border-radius: 4px; }
    .history-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.06);
      font-size: 13px;
      font-weight: 700;
      animation: fade-in .3s ease;
    }
    @keyframes fade-in { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }
    .h-ball {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 900;
      flex-shrink: 0;
      position: relative;
    }
    .h-ball::before {
      content: '';
      position: absolute;
      top: 3px; left: 5px;
      width: 40%; height: 30%;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      filter: blur(1px);
    }
    .h-red  { background: radial-gradient(circle at 35% 30%, #ff6b6b, #c0152a); color: #fff; }
    .h-blue { background: radial-gradient(circle at 35% 30%, #5bc8ff, #1050c8); color: #fff; }
    .h-sep  { color: var(--muted); font-size: 16px; margin: 0 2px; }

    .footer { margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center; }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<main class="wrap">
  <div class="card">
    <h1>🎱 威力彩號碼產生器</h1>
    <p class="sub">第一區 1–38 選 6・第二區 1–8 選 1</p>

    <div class="zone-label">第一區</div>
    <div class="zone1" id="zone1">
      <div class="ball ball-red" id="b0"></div>
      <div class="ball ball-red" id="b1"></div>
      <div class="ball ball-red" id="b2"></div>
      <div class="ball ball-red" id="b3"></div>
      <div class="ball ball-red" id="b4"></div>
      <div class="ball ball-red" id="b5"></div>
    </div>

    <hr class="divider" />

    <div class="zone2-wrap">
      <div class="zone-label">第二區（強力球）</div>
      <div class="ball ball-blue" id="b6"></div>
      <div class="power-badge" id="power-badge">⚡ POWER BALL</div>
    </div>

    <button class="btn" id="btn">🎰 產生號碼</button>

    <div class="history" id="history" style="display:none">
      <div class="history-title">最近記錄</div>
      <div class="history-list" id="history-list"></div>
    </div>

    <div class="footer" style="margin-top:20px">
      <a href="https://clare-le.github.io">← 返回首頁</a>
    </div>
  </div>
</main>

<script>
  const balls    = Array.from({length: 6}, (_, i) => document.getElementById('b' + i));
  const powerBall= document.getElementById('b6');
  const btn      = document.getElementById('btn');
  const badge    = document.getElementById('power-badge');
  const historyEl= document.getElementById('history');
  const histList = document.getElementById('history-list');

  let running = false;
  const history = [];

  function pickZone1() {
    const pool = Array.from({length: 38}, (_, i) => i + 1);
    const picked = [];
    while (picked.length < 6) {
      const idx = Math.floor(Math.random() * pool.length);
      picked.push(pool.splice(idx, 1)[0]);
    }
    return picked.sort((a, b) => a - b);
  }

  function pickZone2() {
    return Math.floor(Math.random() * 8) + 1;
  }

  function showBall(el, num, delay) {
    el.classList.remove('show');
    el.textContent = '';
    badge.classList.remove('show');
    void el.offsetWidth; // reflow
    setTimeout(() => {
      el.textContent = num;
      el.classList.add('show');
    }, delay);
  }

  btn.addEventListener('click', () => {
    if (running) return;
    running = true;
    btn.disabled = true;
    badge.classList.remove('show');

    const z1 = pickZone1();
    const z2 = pickZone2();

    // Drop balls one by one
    balls.forEach((el, i) => showBall(el, z1[i], i * 150));

    // Power ball after zone1
    const powerDelay = 6 * 150 + 200;
    setTimeout(() => {
      showBall(powerBall, z2, 0);
      setTimeout(() => badge.classList.add('show'), 500);
    }, powerDelay);

    // Re-enable after all done
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '🎰 再產生一組';
      running = false;
      addHistory(z1, z2);
    }, powerDelay + 600);
  });

  function addHistory(z1, z2) {
    history.unshift({ z1, z2 });
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    historyEl.style.display = '';
    histList.innerHTML = '';
    history.forEach(({ z1, z2 }) => {
      const row = document.createElement('div');
      row.className = 'history-row';
      z1.forEach(n => {
        const b = document.createElement('div');
        b.className = 'h-ball h-red';
        b.textContent = n;
        row.appendChild(b);
      });
      const sep = document.createElement('span');
      sep.className = 'h-sep';
      sep.textContent = '＋';
      row.appendChild(sep);
      const pb = document.createElement('div');
      pb.className = 'h-ball h-blue';
      pb.textContent = z2;
      row.appendChild(pb);
      histList.appendChild(row);
    });
  }
</script>
</body>
</html>
